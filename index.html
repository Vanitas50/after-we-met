<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>After We Met</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Dancing+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=6" />
</head>
<body>

  <!-- Start screen -->
  <div id="start-screen">
    <p>✦ &nbsp; touch to begin &nbsp; ✦</p>
  </div>

  <!-- Title / finale screen -->
  <div id="title-screen">
    <h1>After We Met</h1>
    <blockquote>
      "And among His signs is that He created for you spouses from among
      yourselves so that you may find tranquility in them; and He placed
      between you affection and mercy."
      <cite>— Qur'an 30:21</cite>
    </blockquote>
  </div>

  <!-- Memory overlay — polaroid card + weiter button -->
  <div id="memory-overlay">
    <div class="memory-card-wrapper">
      <div id="mem-count-display" class="mem-count"></div>

      <figure class="polaroid">
        <div id="card-photo-area" class="card-photo">
          <img id="memory-img" src="" alt="" crossorigin="anonymous" />
          <span id="memory-icon" class="card-icon" aria-hidden="true"></span>
        </div>
        <figcaption id="memory-caption"></figcaption>
      </figure>

      <button id="weiter-btn">Weiter →</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <!-- Floating hint (touch the heart) -->
  <!-- injected by storyboard.js -->

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
